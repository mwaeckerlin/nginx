  # serve php
  location ~* \.php(?:$|/) {
    root ${ROOT};
    include         fastcgi_params;
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    set $path_info $fastcgi_path_info;
    try_files  $fastcgi_script_name $uri.$lang $uri.$lang.php $uri.$lang.html $uri $uri.php $uri.html $uri.$lang/ $uri/ =404;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    fastcgi_param PATH_INFO       $path_info;
    fastcgi_param HTTPS           on;
    resolver        127.0.0.11:53 valid=30s;
    fastcgi_pass    ${PHP_FPM_HOST}:${PHP_FPM_PORT};
    fastcgi_intercept_errors off;
    fastcgi_request_buffering off;
 }

  # Static assets with long cache
  location ~ \.(?:css|js|mjs|map|svg|gif|png|jpg|ico|otf|woff2?)$ {
    root ${ROOT};
    try_files $uri /index.php$request_uri;
    expires 6M;
    access_log off;
  }

  # default handling
  location / {
    root ${ROOT};
    try_files $uri.$lang $uri.$lang.php $uri.$lang.html $uri $uri.php $uri.html $uri.$lang/ $uri/ /index.$lang.php?$args /index.php?$args;
  }
